<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Yura</title>
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Yura" />
<meta name="theme-color" content="#000000" />
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />
<link rel="stylesheet" href="styles.css?v=13" />
</head>
<body>
  <div class="device" id="device">
    <div class="screen-viewport">
      <div class="dynamic-island"></div>

      <!-- status bar -->
      <div class="status-bar">
        <span id="clock">9:41</span>
        <div class="right">
          <!-- signal -->
          <svg width="18" height="12" viewBox="0 0 18 12" fill="currentColor"><rect x="0" y="8" width="3" height="4" rx="1"/><rect x="5" y="5" width="3" height="7" rx="1"/><rect x="10" y="2" width="3" height="10" rx="1"/><rect x="15" y="0" width="3" height="12" rx="1" opacity=".35"/></svg>
          <!-- wifi -->
          <svg width="17" height="12" viewBox="0 0 17 12" fill="currentColor"><path d="M8.5 2.2c2.7 0 5.2 1 7 2.8l-1.5 1.6A7.6 7.6 0 0 0 8.5 4.4 7.6 7.6 0 0 0 3 6.6L1.5 5A9.8 9.8 0 0 1 8.5 2.2Zm0 4a5.6 5.6 0 0 1 4 1.7L11 9.4a3.4 3.4 0 0 0-5 0L4.5 7.9a5.6 5.6 0 0 1 4-1.7Zm0 3.7c.8 0 1.5.6 1.5 1.1L8.5 12 7 11c0-.5.7-1.1 1.5-1.1Z"/></svg>
          <!-- battery -->
          <svg width="27" height="13" viewBox="0 0 27 13" fill="none"><rect x="1" y="1" width="22" height="11" rx="3" stroke="currentColor" opacity=".4"/><rect x="3" y="3" width="16" height="7" rx="1.5" fill="currentColor"/><rect x="24.5" y="4" width="2" height="5" rx="1" fill="currentColor" opacity=".4"/></svg>
        </div>
      </div>

      <!-- screens render here -->
      <div class="screens" id="screens"></div>

      <!-- nav bar (collapsed title) -->
      <div class="nav-bar" id="navbar"><span class="t" id="navbar-title"></span></div>
      <div class="nav-actions" id="nav-actions" hidden></div>

      <!-- tab bar -->
      <nav class="tab-bar" id="tabbar" hidden></nav>

      <!-- sheet -->
      <div class="sheet-scrim" id="scrim"></div>
      <div class="sheet" id="sheet"><div class="grabber"></div><div class="sheet-scroll" id="sheet-body"></div></div>

      <!-- fullscreen modal (ask yura / story) -->
      <div class="fs-modal" id="fsmodal"></div>

      <!-- toast -->
      <div class="toast" id="toast"></div>

      <div class="home-indicator"></div>
    </div>
  </div>

  <script type="module" src="app.js?v=13"></script>
</body>
</html>
